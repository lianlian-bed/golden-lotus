<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>永安宫 · 贵妃模拟器</title>
    <style>
        /* 雍容华贵 · 红帐春深样式 */
        body { 
            /* 默认使用一个古风寝殿背景图，你可以之后换成你喜欢的链接 */
            background-image: url('https://lianlian-bed.github.io/golden-lotus/palace_bg.jpg'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            color: #e6d5c5; 
            font-family: "PingFang SC", "STSong", "SimSun", serif; 
            display: flex; 
            justify-content: center; 
            align-items: flex-end; /* 让内容靠下，模仿小红书 */
            padding: 0; 
            margin: 0; 
            height: 100vh; 
            overflow: hidden; /* 防止背景滚动 */
            position: relative;
        }
        
        /* 全局半透明遮罩，增加景深 */
        body::before {
            content: ""; 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(30,10,10,0.8) 100%);
            z-index: 1; /* 在背景图之上，在内容之下 */
        }
        
        #game-box { 
            width: 100%; 
            max-width: 900px; /* 调宽，更开阔 */
            background: rgba(45, 20, 24, 0.75); /* 半透明深紫红 */
            border: 2px solid #b38b4d; /* 古典金色边框 */
            border-bottom: none; /* 底部不需要边框 */
            border-radius: 20px 20px 0 0; /* 顶部圆角 */
            box-shadow: 0 -10px 50px rgba(183, 110, 121, 0.5); 
            padding: 40px; 
            min-height: 45vh; /* 占屏幕高度的一半 */
            max-height: 65vh; 
            overflow-y: auto; /* 允许文本内部滚动 */
            position: relative; 
            z-index: 10; /* 在遮罩层之上 */
            display: flex; 
            flex-direction: column;
        }
        
        .money-tag { 
            color: #d4af37; 
            font-size: 1.1em; 
            text-align: right; 
            position: absolute; 
            top: 20px; 
            right: 30px;
            text-shadow: 0 0 8px rgba(212, 175, 55, 0.6);
            font-weight: bold;
        }
        
        h2 { 
            color: #f7a8b8; /* 柔和樱花粉 */
            font-size: 1.6em; 
            margin: 0 0 20px 0; 
            text-shadow: 0 0 12px rgba(247, 168, 184, 0.7); 
            letter-spacing: 2px;
            text-align: center;
        }
        
        .desc { 
            line-height: 2.1; 
            margin: 0 0 25px 0; 
            font-size: 1.15em; 
            text-align: justify; 
            white-space: pre-wrap; 
            color: #f5e6d3; /* 温润米白 */
            letter-spacing: 0.8px;
            flex-grow: 1; /* 占据剩余空间 */
        }
        
        .dialogue { 
            background: rgba(255, 192, 203, 0.08); /* 极淡的粉色背景 */
            padding: 20px 25px; 
            border-radius: 10px;
            border-left: 4px solid rgba(247, 168, 184, 0.4); /* 粉色竖线 */
            font-style: italic; 
            margin: 0 0 25px 0; 
            color: #ffb3bf; /* 暧昧粉色 */
            font-size: 1.15em; 
            line-height: 1.8; 
            text-shadow: 0 0 5px rgba(255, 179, 191, 0.3);
        }
        
        .options-area { 
            display: grid; 
            grid-template-columns: 1fr 1fr; /* 选项横向两列排列，更像小红书 */
            gap: 18px; 
            margin-top: auto; /* 靠最下方 */
            padding-top: 20px;
            border-top: 1px solid rgba(179, 139, 77, 0.2); /* 淡淡的金色分割线 */
        }
        
        .btn { 
            background: rgba(125, 77, 85, 0.6); /* 半透明按钮 */
            color: #f5e6d3; 
            border: 1px solid #b38b4d; /* 金色边框 */
            padding: 18px 25px; 
            border-radius: 12px; 
            cursor: pointer; 
            text-align: center; 
            font-size: 1.1em; 
            transition: 0.3s; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            letter-spacing: 1px;
        }
        
        .btn:hover { 
            background: rgba(183, 110, 121, 0.9); 
            transform: translateY(-3px); /* 向上浮动 */
            box-shadow: 0 6px 20px rgba(247, 168, 184, 0.4);
            color: #fff; 
            border-color: #f7a8b8;
        }
        
        #loading { 
            text-align: center; 
            font-size: 1.2em; 
            margin-top: 100px; 
            color: #b38b4d; 
            z-index: 20; 
            position: relative;
        }
    </style>
</head>
<body>

<div id="game-box">
    <div id="loading">正在步入永安宫...</div>
    <div id="content" style="display:none;">
        <div class="money-tag">💰 私库银两: <span id="money">10000</span></div>
        <h2 id="title"></h2>
        <div class="desc" id="desc"></div>
        <div class="dialogue" id="diag"></div>
        <div class="options-area" id="options"></div>
    </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSCvvNKN6IHczgDr57DT12jxGN5m9j-d187_hwTveZ7j9o9FO0GQKZm3veCQAg0ZvRj1dNOAb7-mq96/pub?gid=0&single=true&output=csv';

let storyData = {};
let currentMoney = 10000;

function parseCSV(text) {
    const lines = [];
    let curLine = [];
    let curVal = "";
    let inQuotes = false;
    for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i+1];
        if (inQuotes) {
            if (char === '"' && nextChar === '"') { curVal += '"'; i++; }
            else if (char === '"') { inQuotes = false; }
            else { curVal += char; }
        } else {
            if (char === '"') { inQuotes = true; }
            else if (char === ',') { curLine.push(curVal); curVal = ""; }
            else if (char === '\r' || char === '\n') {
                if (curVal || curLine.length > 0) {
                    curLine.push(curVal);
                    lines.push(curLine);
                    curLine = [];
                    curVal = "";
                }
                if (char === '\r' && nextChar === '\n') i++;
            } else { curVal += char; }
        }
    }
    if (curLine.length > 0 || curVal) { curLine.push(curVal); lines.push(curLine); }
    return lines;
}

async function initGame() {
    try {
        const response = await fetch(CSV_URL);
        const csvText = await response.text();
        const rows = parseCSV(csvText);
        for (let i = 1; i < rows.length; i++) {
            const row = rows[i];
            if (!row[0]) continue;
            const id = row[0].trim().toLowerCase(); 
            storyData[id] = {
                title: row[1], desc: row[2], diag: row[3],
                opt1: row[4], next1: row[5] ? row[5].trim().toLowerCase() : "", m1: parseInt(row[6]) || 0,
                opt2: row[7], next2: row[8] ? row[8].trim().toLowerCase() : "", m2: parseInt(row[9]) || 0
            };
        }
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        play('start'); 
    } catch (e) {
        document.getElementById('loading').innerText = "宫门紧闭，请稍后再试。";
    }
}

function play(id) {
    const s = storyData[id];
    if (!s) return;
    document.getElementById('title').innerText = s.title || "";
    document.getElementById('desc').innerText = s.desc || "";
    document.getElementById('diag').innerText = s.diag || "";
    document.getElementById('money').innerText = currentMoney;
    const area = document.getElementById('options');
    area.innerHTML = "";
    if (s.opt1) addBtn(s.opt1, s.next1, s.m1);
    if (s.opt2) addBtn(s.opt2, s.next2, s.m2);
}

function addBtn(txt, nxt, m) {
    const b = document.createElement('button');
    b.className = "btn";
    b.innerText = txt;
    b.onclick = () => { 
        if (!isNaN(m)) currentMoney += m; 
        play(nxt); 
    };
    document.getElementById('options').appendChild(b);
}
initGame();
</script>
</body>
</html>
