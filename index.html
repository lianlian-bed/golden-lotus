<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>永安宫 · 贵妃模拟器</title>
    <style>
        /* 浪漫暧昧 · 椒房风情样式 */
        body { 
            background: #2b181b; 
            background-image: radial-gradient(circle at center, #422026 0%, #1a0a0d 100%); 
            color: #e6d5c5; 
            font-family: "PingFang SC", "STSong", serif; 
            display: flex; justify-content: center; padding: 20px; margin: 0; 
        }
        #game-box { 
            width: 100%; max-width: 650px; 
            background: rgba(45, 20, 24, 0.85); 
            border: 1px solid #7d4d55; 
            padding: 40px; border-radius: 20px; 
            box-shadow: 0 0 50px rgba(183, 110, 121, 0.2); 
            min-height: 85vh; 
        }
        .money-tag { 
            color: #d4af37; font-size: 1.1em; text-align: right; 
            margin-bottom: 20px; border-bottom: 1px solid rgba(212, 175, 55, 0.2); 
            padding-bottom: 8px; font-weight: bold;
        }
        h2 { 
            color: #f7a8b8; 
            font-size: 1.6em; margin-top: 0; 
            text-shadow: 0 0 10px rgba(247, 168, 184, 0.4); 
            text-align: center; letter-spacing: 2px;
        }
        .desc { 
            line-height: 2.1; margin: 30px 0; font-size: 1.15em; 
            text-align: justify; white-space: pre-wrap; color: #f5e6d3; 
            letter-spacing: 0.5px;
        }
        .dialogue { 
            background: rgba(255, 192, 203, 0.05); 
            padding: 25px; border-radius: 10px;
            border-top: 1px solid rgba(247, 168, 184, 0.2);
            border-bottom: 1px solid rgba(247, 168, 184, 0.2);
            font-style: italic; margin: 30px 0; 
            color: #ffb3bf; font-size: 1.15em; line-height: 1.8; 
        }
        .options-area { display: flex; flex-direction: column; gap: 18px; margin-top: 40px; }
        .btn { 
            width: 100%; 
            background: linear-gradient(135deg, #7d4d55 0%, #4a2a2f 100%); 
            color: #f5e6d3; border: 1px solid #9e6b73; 
            padding: 20px; border-radius: 12px; cursor: pointer; 
            text-align: center; font-size: 1.1em; transition: 0.3s; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .btn:hover { 
            background: #9e6b73; transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(247, 168, 184, 0.3);
            color: #fff; 
        }
        #loading { text-align: center; font-size: 1.2em; margin-top: 100px; color: #9e6b73; }
    </style>
</head>
<body>

<div id="game-box">
    <div id="loading">正在步入永安宫...</div>
    <div id="content" style="display:none;">
        <div class="money-tag">💰 私库银两: <span id="money">10000</span></div>
        <h2 id="title"></h2>
        <div class="desc" id="desc"></div>
        <div class="dialogue" id="diag"></div>
        <div class="options-area" id="options"></div>
    </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSCvvNKN6IHczgDr57DT12jxGN5m9j-d187_hwTveZ7j9o9FO0GQKZm3veCQAg0ZvRj1dNOAb7-mq96/pub?gid=0&single=true&output=csv';

let storyData = {};
let currentMoney = 10000;

function parseCSV(text) {
    const lines = [];
    let curLine = [];
    let curVal = "";
    let inQuotes = false;
    for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i+1];
        if (inQuotes) {
            if (char === '"' && nextChar === '"') { curVal += '"'; i++; }
            else if (char === '"') { inQuotes = false; }
            else { curVal += char; }
        } else {
            if (char === '"') { inQuotes = true; }
            else if (char === ',') { curLine.push(curVal); curVal = ""; }
            else if (char === '\r' || char === '\n') {
                if (curVal || curLine.length > 0) {
                    curLine.push(curVal);
                    lines.push(curLine);
                    curLine = [];
                    curVal = "";
                }
                if (char === '\r' && nextChar === '\n') i++;
            } else { curVal += char; }
        }
    }
    if (curLine.length > 0 || curVal) { curLine.push(curVal); lines.push(curLine); }
    return lines;
}

async function initGame() {
    try {
        const response = await fetch(CSV_URL);
        const csvText = await response.text();
        const rows = parseCSV(csvText);
        for (let i = 1; i < rows.length; i++) {
            const row = rows[i];
            if (!row[0]) continue;
            const id = row[0].trim().toLowerCase(); 
            storyData[id] = {
                title: row[1], desc: row[2], diag: row[3],
                opt1: row[4], next1: row[5] ? row[5].trim().toLowerCase() : "", m1: parseInt(row[6]) || 0,
                opt2: row[7], next2: row[8] ? row[8].trim().toLowerCase() : "", m2: parseInt(row[9]) || 0
            };
        }
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        play('start'); 
    } catch (e) {
        document.getElementById('loading').innerText = "宫门紧闭，请稍后再试。";
    }
}

function play(id) {
    const s = storyData[id];
    if (!s) return;
    document.getElementById('title').innerText = s.title || "";
    document.getElementById('desc').innerText = s.desc || "";
    document.getElementById('diag').innerText = s.diag || "";
    document.getElementById('money').innerText = currentMoney;
    const area = document.getElementById('options');
    area.innerHTML = "";
    if (s.opt1) addBtn(s.opt1, s.next1, s.m1);
    if (s.opt2) addBtn(s.opt2, s.next2, s.m2);
}

function addBtn(txt, nxt, m) {
    const b = document.createElement('button');
    b.className = "btn";
    b.innerText = txt;
    b.onclick = () => { 
        if (!isNaN(m)) currentMoney += m; 
        play(nxt); 
    };
    document.getElementById('options').appendChild(b);
}
initGame();
</script>
</body>
</html>
