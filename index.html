<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宫墙内 · 命运交织</title>
    <style>
        /* 继承并优化你原有的雍容华贵样式 */
        body { 
            background-color: #1a0a0a;
            background-image: url('https://lianlian-bed.github.io/golden-lotus/palace_bg.jpg'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            color: #e6d5c5; 
            font-family: "PingFang SC", "STSong", "SimSun", serif; 
            display: flex; 
            justify-content: center; 
            align-items: flex-end; 
            padding: 0; 
            margin: 0; 
            height: 100vh; 
            overflow: hidden; 
            position: relative;
        }
        
        body::before {
            content: ""; 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(30,10,10,0.9) 100%);
            z-index: 1; 
        }

        /* 初始选择界面样式 */
        #init-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(20, 5, 5, 0.95);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .init-card {
            background: rgba(45, 20, 24, 0.8);
            border: 1px solid #b38b4d;
            padding: 30px;
            border-radius: 15px;
            max-width: 400px;
            margin-bottom: 20px;
        }

        /* 游戏主盒子 */
        #game-box { 
            width: 100%; 
            max-width: 900px; 
            background: rgba(45, 20, 24, 0.85); 
            border: 2px solid #b38b4d; 
            border-bottom: none; 
            border-radius: 20px 20px 0 0; 
            box-shadow: 0 -10px 50px rgba(183, 110, 121, 0.5); 
            padding: 40px; 
            min-height: 50vh; 
            max-height: 75vh; 
            overflow-y: auto; 
            position: relative; 
            z-index: 10; 
            display: none; /* 初始隐藏 */
            flex-direction: column;
        }
        
        .money-tag { 
            color: #d4af37; 
            font-size: 1.1em; 
            position: absolute; 
            top: 20px; right: 30px;
            font-weight: bold;
        }
        
        .status-bar {
            color: #f7a8b8;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        h2 { color: #f7a8b8; text-align: center; letter-spacing: 2px; }
        .desc { line-height: 2.1; margin-bottom: 25px; font-size: 1.15em; white-space: pre-wrap; }
        .dialogue { 
            background: rgba(255, 192, 203, 0.1); 
            padding: 20px; border-radius: 10px;
            border-left: 4px solid #f7a8b8; 
            font-style: italic; color: #ffb3bf; margin-bottom: 25px;
        }
        
        .options-area { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { 
            background: rgba(125, 77, 85, 0.6); color: #f5e6d3; border: 1px solid #b38b4d; 
            padding: 15px; border-radius: 10px; cursor: pointer; transition: 0.3s;
        }
        .btn:hover { background: rgba(183, 110, 121, 0.9); border-color: #f7a8b8; }
    </style>
</head>
<body>

<!-- 初始身份选择层 -->
<div id="init-screen">
    <div class="init-card">
        <h2 style="margin-top:0;">命途选择</h2>
        <p>请问小主，今日入宫是以何种身份？</p>
        <div style="display:flex; flex-direction:column; gap:15px;">
            <button class="btn" onclick="selectIdentity('high')">
                <b>【贵妃开局】</b><br><small>身居高位，荣宠一身，初始资金雄厚</small>
            </button>
            <button class="btn" onclick="selectIdentity('low')">
                <b>【秀女开局】</b><br><small>如履薄冰，从零开始，体验步步惊心</small>
            </button>
        </div>
    </div>
</div>

<div id="game-box">
    <div class="money-tag">💰 私库: <span id="money">0</span></div>
    <div class="status-bar" id="status-info"></div>
    <h2 id="title"></h2>
    <div class="desc" id="desc"></div>
    <div class="dialogue" id="diag"></div>
    <div class="options-area" id="options"></div>
</div>

<script>
// 你原本的 CSV 链接
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSCvvNKN6IHczgDr57DT12jxGN5m9j-d187_hwTveZ7j9o9FO0GQKZm3veCQAg0ZvRj1dNOAb7-mq96/pub?gid=0&single=true&output=csv';

let storyData = {};
let currentMoney = 0;
let userIdentity = "";

// CSV 解析器 (保留你原有的逻辑)
function parseCSV(text) {
    const lines = [];
    let curLine = [];
    let curVal = "";
    let inQuotes = false;
    for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i+1];
        if (inQuotes) {
            if (char === '"' && nextChar === '"') { curVal += '"'; i++; }
            else if (char === '"') { inQuotes = false; }
            else { curVal += char; }
        } else {
            if (char === '"') { inQuotes = true; }
            else if (char === ',') { curLine.push(curVal); curVal = ""; }
            else if (char === '\r' || char === '\n') {
                if (curVal || curLine.length > 0) {
                    curLine.push(curVal);
                    lines.push(curLine);
                    curLine = [];
                    curVal = "";
                }
                if (char === '\r' && nextChar === '\n') i++;
            } else { curVal += char; }
        }
    }
    if (curLine.length > 0 || curVal) { curLine.push(curVal); lines.push(curLine); }
    return lines;
}

// 加载数据
async function loadGameData() {
    try {
        const response = await fetch(CSV_URL);
        const csvText = await response.text();
        const rows = parseCSV(csvText);
        for (let i = 1; i < rows.length; i++) {
            const row = rows[i];
            if (!row[0]) continue;
            const id = row[0].trim().toLowerCase(); 
            storyData[id] = {
                title: row[1], desc: row[2], diag: row[3],
                opt1: row[4], next1: row[5] ? row[5].trim().toLowerCase() : "", m1: parseInt(row[6]) || 0,
                opt2: row[7], next2: row[8] ? row[8].trim().toLowerCase() : "", m2: parseInt(row[9]) || 0
            };
        }
        console.log("宫廷档案加载完毕");
    } catch (e) {
        alert("通讯中断，内务府无法获取档案。");
    }
}

// 身份选择逻辑
function selectIdentity(type) {
    userIdentity = type;
    document.getElementById('init-screen').style.display = 'none';
    document.getElementById('game-box').style.display = 'flex';
    
    if (type === 'high') {
        currentMoney = 10000;
        document.getElementById('status-info').innerText = "位分：正二品 贵妃";
        play('start'); // 对应你 CSV 里的贵妃起始 ID
    } else {
        currentMoney = 500;
        document.getElementById('status-info').innerText = "位分：正八品 答应";
        // 注意：你需要在 CSV 增加一个 ID 为 'low_start' 的行
        play('low_start'); 
    }
}

function play(id) {
    const s = storyData[id];
    if (!s) {
        document.getElementById('desc').innerText = "（此处剧情尚未编写，或 ID 填写错误：" + id + "）";
        return;
    }
    document.getElementById('title').innerText = s.title || "";
    document.getElementById('desc').innerText = s.desc || "";
    document.getElementById('diag').innerText = s.diag || "";
    document.getElementById('money').innerText = currentMoney;
    
    const area = document.getElementById('options');
    area.innerHTML = "";
    if (s.opt1) addBtn(s.opt1, s.next1, s.m1);
    if (s.opt2) addBtn(s.opt2, s.next2, s.m2);
}

function addBtn(txt, nxt, m) {
    const b = document.createElement('button');
    b.className = "btn";
    b.innerText = txt;
    b.onclick = () => { 
        if (!isNaN(m)) currentMoney += m; 
        play(nxt); 
    };
    document.getElementById('options').appendChild(b);
}

// 初始化加载
window.onload = loadGameData;
</script>
</body>
</html>
